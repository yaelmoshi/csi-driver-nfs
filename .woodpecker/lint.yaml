# CSI Driver NFS — Helm chart lint pipeline
# Runs on push/PR to sm-moshi/dhi-hardening branch
when:
  - event: [push, pull_request]
    branch: sm-moshi/dhi-hardening

steps:
  - name: chart-version-guard
    image: ghcr.io/yaelmoshi/chart-version-guard:main@sha256:dcd6f19b52f179900766a19cfc1d99bde7e4036e829994eab13009969248f64e
    commands:
      - chart-version-guard check --ci woodpecker --repo .

  - name: helm-lint
    image: dhi.io/helm:3.20.1-debian13-dev
    commands:
      - helm lint charts/latest/csi-driver-nfs
      - echo "Helm lint passed."
