name: Darwin
on:
    pull_request: {}
    push: {}
jobs:
  build:
    name: Unit Tests
    runs-on: macos-latest
    steps:
    - name: Set up Go 1.x
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
      with:
        go-version: ^1.16
      id: go
    - name: Check out code into the Go module directory
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
    - name: Run unit tests
      run: |
        go version
        go test -v -race ./pkg/...
